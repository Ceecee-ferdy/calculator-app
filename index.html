<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Calculator App</title>
</head>
<body>
   <div class="container">

    <div class="js-display-values display-values"></div>

    <div class="buttons">
     
      
    <button class="js-clear-all clear-button button">Ac</button>
    <button class="js-delete-button delete-button button">
    <img src="Images/delete-left-solid-full.svg" alt="" class="clear-image">
    </button>
    <button class="js-percent-button percent-button button">%</button>
     <button class="js-operator-button operator-button button">/</button>
 

  
    <button class="js-number-button number-button button">7</button>
    <button class="js-number-button number-button button">8</button>
    <button class="js-number-button number-button button">9</button>
    <button class="js-operator-button operator-button button">*</button>

  
 
 
    <button class="js-number-button number-button button">4</button>
    <button class="js-number-button number-button button">5</button>
    <button class="js-number-button number-button button">6</button>
    <button class="js-operator-button operator-button button">-</button>
  
 
   <button class="js-number-button number-button button">1</button>
    <button class="js-number-button number-button button">2</button>
    <button class="js-number-button number-button button">3</button>
    <button class="js-operator-button operator-button button">+</button>
 

 
    <button class="js-number-button zero-button button">0</button>
    <button class="js-decimal-button decimal-button button">.</button>
    <button class="js-equal-button equal-button button">=</button>
 

    </div>

  
   
   </div>
  

  <script src="script.js"></script>
</body>
</html>
